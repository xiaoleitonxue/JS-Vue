<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS-函数</title>
</head>

<body>


  <script>
    //1. 函数定义调用 - 其名函数表达式
    function add1(a,b) {
      return a + b;
    }

    let result1 = add1(10,20,60);
    alert(result1);
    console.log(result1);

    //2. 函数定义调用 - 匿名函数表达式
    //2.1.函数表达式
    let add2 = function(a,b) {
      return a + b;
    }

    let result2 = add2(100,200,600);
    alert(result2);
    console.log(result2);

    //2.2.箭头函数表达式
    let add3 = (a,b) => {
      return a + b;
    }

    let result3 = add3(1000,2000,6000);
    alert(result3);
    console.log(result3);


  </script>
</body>

</html>
